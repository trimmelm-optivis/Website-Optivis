<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Glasfaser-Verteilnetz">
  <defs>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0c1426"/><stop offset="1" stop-color="#0a0f1c"/></linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
    <radialGradient id="g" cx="0.5" cy="0.5" r="0.6"><stop offset="0" stop-color="#3b82f6" stop-opacity="0.30"/><stop offset="1" stop-color="#3b82f6" stop-opacity="0"/></radialGradient>
    <pattern id="p" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0H0V34" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/></pattern>
  </defs>
  <rect width="800" height="500" fill="url(#b)"/><rect width="800" height="500" fill="url(#p)"/><rect width="800" height="500" fill="url(#g)"/>

  <!-- radiale Glasfaser-Strecken -->
  <g stroke="url(#a)" stroke-opacity="0.5" stroke-width="2.5">
    <path d="M400 250 L160 150"/><path d="M400 250 L160 350"/>
    <path d="M400 250 L640 150"/><path d="M400 250 L640 350"/>
    <path d="M400 250 L300 96"/><path d="M400 250 L500 96"/>
    <path d="M400 250 L300 404"/><path d="M400 250 L500 404"/>
  </g>

  <!-- Häuser (Endkunden) -->
  <g fill="#0e1a2e" stroke="url(#a)" stroke-width="2.5" stroke-linejoin="round">
    <path d="M138 156 v-26 h44 v26 M132 130 l28 -20 l28 20"/>
    <path d="M138 376 v-26 h44 v26 M132 350 l28 -20 l28 20"/>
    <path d="M618 156 v-26 h44 v26 M612 130 l28 -20 l28 20"/>
    <path d="M618 376 v-26 h44 v26 M612 350 l28 -20 l28 20"/>
  </g>
  <g fill="#22d3ee"><circle cx="160" cy="142" r="4"/><circle cx="160" cy="362" r="4"/><circle cx="640" cy="142" r="4"/><circle cx="640" cy="362" r="4"/></g>

  <!-- Verteiler-Knoten -->
  <g fill="#0e1a2e" stroke="url(#a)" stroke-width="3">
    <circle cx="300" cy="96" r="14"/><circle cx="500" cy="96" r="14"/>
    <circle cx="300" cy="404" r="14"/><circle cx="500" cy="404" r="14"/>
  </g>
  <g fill="#3b82f6"><circle cx="300" cy="96" r="4"/><circle cx="500" cy="96" r="4"/><circle cx="300" cy="404" r="4"/><circle cx="500" cy="404" r="4"/></g>

  <!-- zentraler Hub -->
  <circle cx="400" cy="250" r="40" fill="#0e1a2e" stroke="url(#a)" stroke-width="3"/>
  <circle cx="400" cy="250" r="20" fill="url(#a)"/>
  <circle cx="400" cy="250" r="8" fill="#06121f"/>
</svg>
