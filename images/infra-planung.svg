<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" fill="none" role="img" aria-label="Planung">
  <defs>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0c1426"/><stop offset="1" stop-color="#0a0f1c"/></linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
    <radialGradient id="g" cx="0.5" cy="0.1" r="0.8"><stop offset="0" stop-color="#3b82f6" stop-opacity="0.22"/><stop offset="1" stop-color="#3b82f6" stop-opacity="0"/></radialGradient>
    <pattern id="p" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/></pattern>
  </defs>
  <rect width="480" height="300" fill="url(#b)"/><rect width="480" height="300" fill="url(#p)"/><rect width="480" height="300" fill="url(#g)"/>

  <!-- Parzellen -->
  <g fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.07">
    <rect x="70" y="70" width="120" height="90" rx="6"/>
    <rect x="210" y="90" width="90" height="100" rx="6"/>
    <rect x="320" y="60" width="100" height="90" rx="6"/>
    <rect x="120" y="190" width="120" height="70" rx="6"/>
    <rect x="300" y="180" width="110" height="80" rx="6"/>
  </g>

  <!-- Route -->
  <path d="M70 230 L160 180 L240 220 L320 140 L400 110"
        stroke="url(#a)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#0e1a2e" stroke="url(#a)" stroke-width="2.5">
    <circle cx="160" cy="180" r="8"/><circle cx="240" cy="220" r="8"/><circle cx="320" cy="140" r="8"/>
  </g>
  <circle cx="70" cy="230" r="10" fill="url(#a)"/>

  <!-- Pin -->
  <g transform="translate(400,110)">
    <path d="M0 0 C-13 -18 -13 -32 0 -32 C13 -32 13 -18 0 0 Z" fill="url(#a)"/>
    <circle cx="0" cy="-21" r="5" fill="#06121f"/>
  </g>
</svg>
