<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Trassenplanung">
  <defs>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0c1426"/><stop offset="1" stop-color="#0a0f1c"/></linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
    <radialGradient id="g" cx="0.5" cy="0.2" r="0.75"><stop offset="0" stop-color="#3b82f6" stop-opacity="0.26"/><stop offset="1" stop-color="#3b82f6" stop-opacity="0"/></radialGradient>
    <pattern id="p" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0H0V34" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/></pattern>
  </defs>
  <rect width="800" height="500" fill="url(#b)"/><rect width="800" height="500" fill="url(#p)"/><rect width="800" height="500" fill="url(#g)"/>

  <!-- Parzellen / Blöcke (Karte) -->
  <g fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06">
    <rect x="120" y="120" width="150" height="110" rx="8"/>
    <rect x="300" y="150" width="120" height="120" rx="8"/>
    <rect x="540" y="110" width="150" height="120" rx="8"/>
    <rect x="180" y="300" width="130" height="100" rx="8"/>
    <rect x="470" y="300" width="170" height="110" rx="8"/>
  </g>

  <!-- Trasse / Route -->
  <path d="M110 380 L210 320 L300 360 L420 250 L520 300 L630 180 L700 210"
        stroke="url(#a)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#0e1a2e" stroke="url(#a)" stroke-width="3">
    <circle cx="210" cy="320" r="9"/><circle cx="300" cy="360" r="9"/>
    <circle cx="420" cy="250" r="9"/><circle cx="520" cy="300" r="9"/><circle cx="630" cy="180" r="9"/>
  </g>
  <circle cx="110" cy="380" r="12" fill="url(#a)"/>

  <!-- Standort-Pin am Ziel -->
  <g transform="translate(700,210)">
    <path d="M0 0 C-16 -22 -16 -40 0 -40 C16 -40 16 -22 0 0 Z" fill="url(#a)"/>
    <circle cx="0" cy="-26" r="6" fill="#06121f"/>
  </g>
</svg>
