    <rect x="60" y="120" width="360" height="40"/>
    <rect x="60" y="160" width="360" height="34"/>
    <rect x="60" y="194" width="360" height="46"/>
  </g>
  <!-- Oberfläche -->
  <path d="M60 120 H420" stroke="url(#a)" stroke-width="3" stroke-linecap="round"/>

  <!-- Künette (Graben) -->
