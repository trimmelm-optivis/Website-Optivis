  <!-- Leerrohre + Kabel -->
  <g stroke="url(#a)" stroke-width="2.5" fill="#0e1a2e">
    <circle cx="220" cy="208" r="15"/><circle cx="260" cy="208" r="15"/>
  </g>
  <g fill="#22d3ee"><circle cx="220" cy="208" r="5"/><circle cx="260" cy="208" r="5"/></g>
