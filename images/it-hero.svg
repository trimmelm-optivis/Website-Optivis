<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Automatisierter Workflow">
  <defs>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1426"/><stop offset="1" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="g" cx="0.5" cy="0.16" r="0.72">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.30"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="p" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="6" refY="4.5" orient="auto">
      <path d="M1 1 L7 4.5 L1 8" stroke="#22d3ee" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="url(#b)"/>
  <rect width="800" height="500" fill="url(#p)"/>
  <rect width="800" height="500" fill="url(#g)"/>

  <g stroke="#22d3ee" stroke-opacity="0.5" stroke-width="2.5" fill="none">
    <path d="M200 250 L362 162" marker-end="url(#ah)"/>
    <path d="M200 250 L362 250" marker-end="url(#ah)"/>
    <path d="M200 250 L362 338" marker-end="url(#ah)"/>
    <path d="M398 162 L562 214" marker-end="url(#ah)"/>
    <path d="M398 250 L560 250" marker-end="url(#ah)"/>
    <path d="M398 338 L562 318" marker-end="url(#ah)"/>
    <path d="M600 222 L658 252" marker-end="url(#ah)"/>
    <path d="M600 298 L658 272" marker-end="url(#ah)"/>
  </g>

  <!-- Start -->
  <circle cx="170" cy="250" r="28" fill="url(#a)"/>
  <circle cx="170" cy="250" r="10" fill="#06121f"/>

  <!-- Zwischen-Knoten -->
  <g fill="#0e1a2e" stroke="url(#a)" stroke-width="3">
    <circle cx="380" cy="162" r="20"/><circle cx="380" cy="250" r="20"/><circle cx="380" cy="338" r="20"/>
    <circle cx="580" cy="214" r="20"/><circle cx="580" cy="318" r="20"/>
  </g>
  <g fill="#22d3ee">
    <circle cx="380" cy="162" r="5"/><circle cx="380" cy="250" r="5"/><circle cx="380" cy="338" r="5"/>
    <circle cx="580" cy="214" r="5"/><circle cx="580" cy="318" r="5"/>
  </g>

  <!-- Ergebnis-Knoten mit Haken -->
  <circle cx="690" cy="262" r="34" fill="#0e1a2e" stroke="url(#a)" stroke-width="3"/>
  <path d="M674 262 l11 12 l21 -26" stroke="url(#a)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Zahnrad oben rechts (Automatisierung) -->
  <g transform="translate(648,96)" stroke="url(#a)" stroke-width="3" fill="none">
    <circle r="16"/>
    <circle r="6" fill="#22d3ee" stroke="none"/>
    <g stroke-linecap="round">
      <path d="M0 -16 V-26"/><path d="M0 16 V26"/><path d="M-16 0 H-26"/><path d="M16 0 H26"/>
      <path d="M-11 -11 L-18 -18"/><path d="M11 11 L18 18"/><path d="M11 -11 L18 -18"/><path d="M-11 11 L-18 18"/>
    </g>
  </g>
</svg>
