<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Prozess in drei Schritten">
  <defs>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1426"/><stop offset="1" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="g" cx="0.5" cy="0.2" r="0.75">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.26"/><stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <pattern id="p" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="6" refY="4.5" orient="auto">
      <path d="M1 1 L7 4.5 L1 8" stroke="#22d3ee" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="url(#b)"/>
  <rect width="800" height="500" fill="url(#p)"/>
  <rect width="800" height="500" fill="url(#g)"/>

  <!-- Verbindungspfeile -->
  <g stroke="#22d3ee" stroke-opacity="0.55" stroke-width="3" fill="none">
    <path d="M256 258 L344 258" marker-end="url(#ah)"/>
    <path d="M456 258 L544 258" marker-end="url(#ah)"/>
  </g>

  <!-- Schritt-Kreise -->
  <g fill="#0e1a2e" stroke="url(#a)" stroke-width="3">
    <circle cx="200" cy="258" r="48"/><circle cx="400" cy="258" r="48"/><circle cx="600" cy="258" r="48"/>
  </g>

  <!-- 01 Analysieren: Lupe -->
  <g transform="translate(200,258)" stroke="url(#a)" stroke-width="4" fill="none" stroke-linecap="round">
    <circle cx="-5" cy="-5" r="15"/>
    <path d="M7 7 L18 18"/>
  </g>

  <!-- 02 Optimieren: Regler -->
  <g transform="translate(400,258)" stroke="url(#a)" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M-20 -10 H20"/><path d="M-20 10 H20"/>
    <circle cx="-6" cy="-10" r="6" fill="#0e1a2e"/>
    <circle cx="8" cy="10" r="6" fill="#0e1a2e"/>
  </g>

  <!-- 03 Automatisieren: Blitz -->
  <g transform="translate(600,258)">
    <path d="M6 -22 L-12 4 H2 L-4 22 L18 -6 H4 Z" fill="url(#a)"/>
  </g>

  <!-- dezente Beschriftungs-Balken -->
  <g fill="#1a2740">
    <rect x="160" y="338" width="80" height="9" rx="4.5"/>
    <rect x="360" y="338" width="80" height="9" rx="4.5"/>
    <rect x="560" y="338" width="80" height="9" rx="4.5"/>
  </g>
  <g fill="#22d3ee" fill-opacity="0.6">
    <rect x="176" y="356" width="48" height="7" rx="3.5"/>
    <rect x="376" y="356" width="48" height="7" rx="3.5"/>
    <rect x="576" y="356" width="48" height="7" rx="3.5"/>
  </g>
</svg>
